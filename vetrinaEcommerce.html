<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Vetrina - Negozio Moderno</title>
  <style>
    /* ... (Stesso CSS della Navbar e Body del file precedente) ... */
    :root { --primary: #6366f1; --secondary: #a855f7; }
    body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; padding: 0; margin: 0; }
    nav { background: #0f172a; padding: 15px 30px; display: flex; align-items: center; gap: 15px; color: white; }
    .logo { flex-grow: 1; font-weight: bold; }
    nav button { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 8px; cursor: pointer; }

    .main { max-width: 1200px; margin: 40px auto; padding: 20px; }
    #lista-prodotti { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
    
    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 1px solid transparent;
    }
    .card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
    .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }
    .prezzo { font-size: 1.4rem; font-weight: bold; color: var(--primary); margin: 10px 0; }
    .btn-add {
      width: 100%; background: #0f172a; color: white; border: none; padding: 12px;
      border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    .btn-add:hover { background: var(--primary); }
  </style>
</head>
<body>
  <nav>
    <div class="logo">🛒 NegozioCSV</div>
    <button onclick="location.href='loginEcommerce.html'">Login</button>
    <button onclick="location.href='registrazioneEcommerce.html'">Registrazione</button>
    <button onclick="location.href='vetrinaEcommerce.html'">Vetrina</button>
    <button onclick="location.href='carrelloEcommerce.html'">Carrello</button>
  </nav>

  <div class="main">
    <h1>I nostri prodotti</h1>
    <input type="file" id="csv" onchange="leggiCSV(this)" style="margin: 20px 0;">
    <div id="lista-prodotti"></div>
  </div>

  <script>
    function leggiCSV(input) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const righe = e.target.result.split('\n').slice(1);
        const container = document.getElementById('lista-prodotti');
        container.innerHTML = '';
        righe.forEach(r => {
          const col = r.split(',');
          if(col.length < 2) return;
          container.innerHTML += `
            <div class="card">
              <img src="${col[3] || 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
              <h3>${col[0]}</h3>
              <p class="prezzo">€ ${parseFloat(col[4]).toFixed(2)}</p>
              <button class="btn-add" onclick="aggiungi('${col[0]}', ${col[4]})">Aggiungi</button>
            </div>
          `;
        });
      };
      reader.readAsText(input.files[0]);
    }

    function aggiungi(nome, prezzo) {
      let carrello = JSON.parse(localStorage.getItem('carrello')) || [];
      carrello.push({nome, prezzo});
      localStorage.setItem('carrello', JSON.stringify(carrello));
      aggiornaContatore();
    }

    function aggiornaContatore() {
      const carrello = JSON.parse(localStorage.getItem('carrello')) || [];
      document.getElementById('count').textContent = carrello.length;
    }
    aggiornaContatore();
  </script>
</body>
</html>
