<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>NewCave - Catalogo Minerali</title>
  <style>
    :root { --dark: #0a0a0a; --gold: #c5a059; --bg: #161616; --text: #e0e0e0; --sidebar-w: 260px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Garamond', serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

    nav { width: var(--sidebar-w); background: var(--dark); border-right: 1px solid #222; display: flex; flex-direction: column; padding: 40px 0; position: fixed; height: 100vh; }
    .logo-area { padding: 0 25px 50px; font-size: 1.8rem; font-weight: bold; letter-spacing: 4px; color: var(--gold); text-align: center; }
    nav button { background: transparent; color: #777; border: none; padding: 18px 25px; text-align: left; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }
    
    .right-side-container { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
    .main-content { flex: 1; padding: 60px; }
    
    h2 { font-size: 2.5rem; color: var(--gold); margin-bottom: 40px; font-weight: normal; }
    
    /* GRIGLIA PRODOTTI */
    #lista-prodotti { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
    .card { background: #000; padding: 25px; border: 1px solid #222; text-align: center; transition: 0.4s; }
    .card:hover { border-color: var(--gold); transform: translateY(-5px); }
    .card img { width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid #222; margin-bottom: 20px; }
    .card h3 { color: var(--gold); font-size: 1.1rem; margin-bottom: 10px; font-weight: normal; text-transform: uppercase; }
    .card p { font-size: 0.8rem; color: #666; margin-bottom: 15px; }
    .prezzo { font-size: 1.4rem; color: white; font-weight: bold; margin-bottom: 20px; }
    
    .btn-buy { width: 100%; background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
    .btn-buy:hover { background: var(--gold); color: black; }

    footer { background: #000; color: #444; padding: 50px 60px; display: flex; justify-content: space-between; border-top: 1px solid #1a1a1a; margin-top: 60px; }
    .footer-col h4 { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; }
    .footer-col p { font-size: 0.8rem; }
  </style>
</head>
<body>
  <nav>
    <div class="logo-area">NEWCAVE</div>
    <button onclick="location.href='loginEcommerce.html'">Accesso Membri</button>
    <button onclick="location.href='registrazioneEcommerce.html'">Nuovo Profilo</button>
    <button onclick="location.href='vetrinaEcommerce.html'">Collezione Minerali</button>
    <button onclick="location.href='carrelloEcommerce.html'">Scrigno e Certificati</button>
  </nav>

  <div class="right-side-container">
    <div class="main-content">
      <h2>I Nostri Reperti</h2>
      <div style="background: #000; padding: 30px; border: 1px solid #222; margin-bottom: 40px;">
        <label>Carica Registro Estrazioni (CSV)</label>
        <input type="file" onchange="leggiCSV(this)" style="margin-top: 15px; border: none; background: none; color: #888;">
      </div>
      <div id="lista-prodotti"></div>
    </div>
    <footer>
      <div class="footer-col"><h4>NewCave</h4><p>Nerviano (MI)</p></div>
      <div class="footer-col"><h4>Supporto Geologico</h4><p>info@newcave-minerals.it</p></div>
      <div class="footer-col" style="text-align: right;"><h4>Legal</h4><p>© 2026 NewCave Minerali.</p></div>
    </footer>
  </div>

  <script>
    function leggiCSV(input) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const righe = e.target.result.split('\n').slice(1);
        const container = document.getElementById('lista-prodotti');
        container.innerHTML = '';
        righe.forEach(r => {
          const col = r.split(',');
          if(col.length < 6) return;
          container.innerHTML += `
            <div class="card">
              <img src="${col[5].trim()}">
              <h3>${col[0].trim()}</h3>
              <p>Origine: ${col[2].trim()} | Peso: ${col[3].trim()}</p>
              <div class="prezzo">€ ${parseFloat(col[4]).toFixed(2)}</div>
              <button class="btn-buy" onclick="aggiungi('${col[0].trim()}', ${col[4]})">Aggiungi allo Scrigno</button>
            </div>`;
        });
      };
      reader.readAsText(input.files[0]);
    }
    function aggiungi(nome, prezzo) {
      let carrello = JSON.parse(localStorage.getItem('carrello')) || [];
      carrello.push({nome, prezzo});
      localStorage.setItem('carrello', JSON.stringify(carrello));
      alert("Minerale aggiunto con successo.");
    }
  </script>
</body>
</html>
