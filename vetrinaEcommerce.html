<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogo - NewCave Portal</title>
  <style>
    :root {
      --sidebar-bg: #0f172a;
      --accent: #3b82f6;
      --bg-main: #f8fafc;
      --footer-bg: #020617;
      --sidebar-width: 260px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-main); display: flex; min-height: 100vh; }

    /* SIDEBAR */
    nav { width: var(--sidebar-width); background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; padding: 30px 0; position: fixed; height: 100vh; z-index: 10; }
    .logo-area { padding: 0 25px 40px; font-size: 1.4rem; font-weight: 800; color: white; letter-spacing: -1px; }
    .logo-area span { color: var(--accent); }
    nav button { background: transparent; color: #94a3b8; border: none; padding: 15px 25px; text-align: left; cursor: pointer; transition: 0.2s; width: 100%; border-left: 3px solid transparent; font-size: 0.9rem; }
    nav button:hover { background: rgba(255,255,255,0.05); color: white; border-left: 3px solid var(--accent); }

    /* CONTENT */
    .right-side-container { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .main-content { flex: 1; padding: 60px; }
    
    h2 { font-size: 2rem; color: var(--sidebar-bg); margin-bottom: 30px; font-weight: 700; }
    .upload-section { background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 40px; }
    
    #lista-prodotti { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
    .card { background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
    .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
    .card h3 { font-size: 1.1rem; color: var(--sidebar-bg); margin-bottom: 10px; }
    .prezzo { color: var(--accent); font-weight: 800; font-size: 1.3rem; margin-bottom: 20px; }
    .btn-add { width: 100%; background: var(--sidebar-bg); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-add:hover { background: var(--accent); }

    /* FOOTER */
    footer { background: var(--footer-bg); color: #64748b; padding: 50px 60px; display: flex; justify-content: space-between; border-top: 1px solid #1e293b; margin-top: auto; }
    .footer-col h4 { color: white; margin-bottom: 18px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    .footer-col p { font-size: 0.85rem; line-height: 1.8; }
  </style>
</head>
<body>
  <nav>
    <div class="logo-area">New<span>Cave</span></div>
    <button onclick="location.href='loginEcommerce.html'">Terminale Accesso</button>
    <button onclick="location.href='registrazioneEcommerce.html'">Registrazione Nodo</button>
    <button onclick="location.href='vetrinaEcommerce.html'">Sfoglia Catalogo</button>
    <button onclick="location.href='carrelloEcommerce.html'">Analisi Ordine</button>
  </nav>

  <div class="right-side-container">
    <div class="main-content">
      <h2>Catalogo Asset Digitali</h2>
      <div class="upload-section">
        <p style="margin-bottom: 15px; font-weight: 600; color: #475569;">Importazione Database (CSV)</p>
        <input type="file" onchange="leggiCSV(this)">
      </div>
      <div id="lista-prodotti"></div>
    </div>

    <footer>
      <div class="footer-col"><h4>NewCave Headquarters</h4><p>Digital District, Area Rho<br>20017 Milano, IT</p></div>
      <div class="footer-col"><h4>Contatti Sistemi</h4><p>tech-support@newcave.com<br>Protocollo: +39 02 998877</p></div>
      <div class="footer-col" style="text-align: right;"><h4>Legal</h4><p>© 2026 NewCave Technologies S.p.A.<br>Sistemi di gestione asset certificati.</p></div>
    </footer>
  </div>

  <script>
    function leggiCSV(input) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const righe = e.target.result.split('\n').slice(1);
        const container = document.getElementById('lista-prodotti');
        container.innerHTML = '';
        righe.forEach(r => {
          const col = r.split(',');
          if(col.length < 5) return;
          container.innerHTML += `
            <div class="card">
              <h3>${col[0]}</h3>
              <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 10px;">Codice: ${col[1]}</p>
              <p class="prezzo">€ ${parseFloat(col[4]).toFixed(2)}</p>
              <button class="btn-add" onclick="aggiungi('${col[0]}', ${col[4]})">Aggiungi al Flusso</button>
            </div>`;
        });
      };
      reader.readAsText(input.files[0]);
    }

    function aggiungi(nome, prezzo) {
      let carrello = JSON.parse(localStorage.getItem('carrello')) || [];
      carrello.push({nome, prezzo});
      localStorage.setItem('carrello', JSON.stringify(carrello));
      alert("Prodotto aggiunto correttamente.");
    }
  </script>
</body>
</html>
