<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>NewCave - Vetrina Minerale</title>
    <style>
        :root { --magma: #ff4d00; --gold: #ffcc00; --dark: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: #fff; display: flex; }

        nav { width: 260px; background: #000; border-right: 2px solid var(--magma); position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 40px 0; }
        .logo { font-size: 2.2rem; font-weight: 900; text-align: center; color: var(--magma); margin-bottom: 50px; }
        nav button { background: transparent; color: #fff; border: none; padding: 20px; text-align: left; cursor: pointer; text-transform: uppercase; font-weight: bold; }

        .container { margin-left: 260px; flex: 1; padding: 60px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        
        /* Grid */
        #display-minerali { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; }
        .card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.4s; }
        .card:hover { border-color: var(--magma); transform: scale(1.03); box-shadow: 0 10px 30px rgba(255, 77, 0, 0.2); }
        .card img { width: 100%; height: 280px; object-fit: cover; filter: grayscale(20%); transition: 0.4s; }
        .card:hover img { filter: grayscale(0%); }
        
        .card-body { padding: 25px; text-align: center; }
        .card-body h3 { color: var(--gold); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .card-body p { color: #777; font-size: 0.85rem; margin-bottom: 15px; }
        .prezzo-tag { font-size: 2rem; font-weight: 900; color: #fff; margin-bottom: 20px; }
        
        .btn-add { width: 100%; background: var(--magma); color: #000; border: none; padding: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 5px; }
        
        input[type="file"] { border: 2px dashed var(--magma); padding: 15px; color: var(--magma); background: #000; border-radius: 8px; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">NEWCAVE</div>
        <button onclick="location.href='loginEcommerce.html'">Login</button>
        <button onclick="location.href='vetrinaEcommerce.html'">Collezione</button>
        <button onclick="location.href='carrelloEcommerce.html'">Lo Scrigno</button>
    </nav>
    <div class="container">
        <div class="top-bar">
            <h1 style="color: var(--magma); font-size: 2.5rem;">REGISTRO ESTRAZIONI</h1>
            <input type="file" onchange="processaCSV(this)" accept=".csv">
        </div>
        <div id="display-minerali"></div>
    </div>

    <script>
        function processaCSV(input) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const righe = e.target.result.split('\n').slice(1);
                const griglia = document.getElementById('display-minerali');
                griglia.innerHTML = '';
                
                righe.forEach(r => {
                    const c = r.split(',');
                    if(c.length < 6) return;
                    griglia.innerHTML += `
                        <div class="card">
                            <img src="${c[5].trim()}" onerror="this.src='https://via.placeholder.com/400x300/111/ff4d00?text=Minerale+In+Arrivo'">
                            <div class="card-body">
                                <h3>${c[0].trim()}</h3>
                                <p>Provenienza: ${c[2].trim()} | Peso: ${c[3].trim()}</p>
                                <div class="prezzo-tag">€ ${parseFloat(c[4]).toFixed(2)}</div>
                                <button class="btn-add" onclick="salvaInScrigno('${c[0].trim()}', ${c[4]})">Aggiungi allo Scrigno</button>
                            </div>
                        </div>`;
                });
            };
            reader.readAsText(input.files[0]);
        }

        function salvaInScrigno(nome, prezzo) {
            let s = JSON.parse(localStorage.getItem('scrigno')) || [];
            s.push({nome, prezzo});
            localStorage.setItem('scrigno', JSON.stringify(s));
            alert("Minerale aggiunto correttamente.");
        }
    </script>
</body>
</html>
