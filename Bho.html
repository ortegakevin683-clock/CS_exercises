<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Anagrafica 5.0</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #eeeeee;
            margin: 30px;
        }

        h2 {
            text-align: center;
            color: black;
        }

        input[type="text"],
        input[type="date"],
        select {
            width: 280px;
            padding: 5px;
            margin-bottom: 12px;
            font-size: 15px;
        }

        select[multiple] {
            height: 100px;
        }

        button {
            background: #336699;
            color: white;
            border: 0;
            padding: 10px 40px;
            font-size: 16px;
            margin: 20px 0;
            cursor: pointer;
        }

        button:hover {
            background: #224466;
        }

        a {
            display: block;
            text-align: center;
            color: #444;
        }

        div {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<h2>Anagrafica Utente</h2>

Nome:<br>
<input type="text" id="nome"><br><br>

Cognome:<br>
<input type="text" id="cognome"><br><br>

Città:<br>
<input type="text" id="citta"><br><br>

CAP:<br>
<input type="text" id="cap"><br><br>

Data di nascita:<br>
<input type="date" id="dataNascita"><br><br>

Sesso:<br>
<input type="radio" name="sesso" id="sessoM" value="Maschio"> Maschio<br>
<input type="radio" name="sesso" id="sessoF" value="Femmina"> Femmina<br>
<input type="radio" name="sesso" id="sessoAltro" value="Altro"> Altro<br><br>

Mezzi posseduti:<br>
<input type="checkbox" id="auto"> Auto<br>
<input type="checkbox" id="moto"> Moto<br>
<input type="checkbox" id="bici"> Bici<br>
<input type="checkbox" id="cavallo"> Cavallo<br>
<input type="checkbox" id="deltaplano"> Deltaplano<br><br>

Provincia:<br>
<select id="provincia">
    <option value="MI">Milano</option>
    <option value="VA">Varese</option>
    <option value="NA">Napoli</option>
    <option value="TO">Torino</option>
    <option value="FI">Firenze</option>
</select><br><br>

Materie preferite (premi CTRL per sceglierne più di una):<br>
<select id="materie" multiple size="5">
    <option value="Italiano">Italiano</option>
    <option value="Storia">Storia</option>
    <option value="Matematica">Matematica</option>
    <option value="TPSIT">TPS</option>
    <option value="Inglese">Inglese</option>
</select><br><br>

<button onclick="mostraRisultato()">Invia</button><br><br>

<a href="stampaAnagrafica.html">Stampa</a>

<script>
    let ele = JSON.parse(localStorage.getItem("elenco")) || [];

    function getGenerazione(anno) {
        if (anno >= 2013) return "Generazione Alpha";
        else if (anno >= 1997) return "Generazione Z";
        else if (anno >= 1981) return "Millennials";
        else if (anno >= 1965) return "Generazione X";
        else if (anno >= 1946) return "Baby Boomers";
        else if (anno >= 1928) return "Generazione Silenziosa";
        else if (anno >= 1901) return "Greatest Generation";
        else return "Generazione non definita";
    }

    function mostraRisultato() {
        let persona = {
            nome: document.getElementById("nome").value,
            cognome: document.getElementById("cognome").value,
            citta: document.getElementById("citta").value,
            cap: document.getElementById("cap").value,
            dataNascita: document.getElementById("dataNascita").value,
            sesso: "N/D",
            mezzi: [],
            provincia: document.getElementById("provincia").value,
            materie: []
        };

        let radio = document.querySelector('input[name="sesso"]:checked');
        if (radio) persona.sesso = radio.value;

        if (document.getElementById("auto").checked) persona.mezzi.push("Auto");
        if (document.getElementById("moto").checked) persona.mezzi.push("Moto");
        if (document.getElementById("bici").checked) persona.mezzi.push("Bici");
        if (document.getElementById("cavallo").checked) persona.mezzi.push("Cavallo");
        if (document.getElementById("deltaplano").checked) persona.mezzi.push("Deltaplano");

        let select = document.getElementById("materie");
        for (let opt of select.options) {
            if (opt.selected) {
                persona.materie.push(opt.value);
            }
        }

        if (persona.dataNascita) {
            let anno = new Date(persona.dataNascita).getFullYear();
            let oggi = new Date().getFullYear();
            persona.eta = oggi - anno;
            persona.generazione = getGenerazione(anno);
        }

        ele.push(persona);
        localStorage.setItem("elenco", JSON.stringify(ele));
    }
</script>

</body>
</html>
