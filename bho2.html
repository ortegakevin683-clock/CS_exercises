<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>localStorage - Stampa Completa</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #eeeeee;
            margin: 30px;
            color: #333;
        }

        h2 {
            text-align: center;
            color: black;
        }

        table {
            width: 100%;
            max-width: 900px;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #999;
            padding: 8px;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #336699;
            color: white;
        }

        tr:nth-child(even) {
            background: #f5f5f5;
        }

        button {
            background: #336699;
            color: white;
            border: 0;
            padding: 10px 30px;
            font-size: 16px;
            margin: 20px 0;
            cursor: pointer;
        }

        button:hover {
            background: #224466;
        }

        a {
            display: block;
            text-align: center;
            color: #444;
            margin: 15px 0;
        }

        #vuoto {
            text-align: center;
            color: #666;
            font-size: 18px;
        }
    </style>
</head>
<body>

<h2>Elenco Completo Anagrafica 5.0</h2>

<div id="cont"></div>

<script>
    let dati = JSON.parse(localStorage.getItem("elenco")) || [];

    let contenitore = document.getElementById("cont");

    if (dati.length === 0) {
        let messaggio = document.createElement("p");
        messaggio.id = "vuoto";
        messaggio.textContent = "L'elenco è vuoto.";
        contenitore.appendChild(messaggio);
    } else {
        let tabella = document.createElement("table");

        let intestazione = document.createElement("tr");

        let colonne = [
            "N°", "Nome e Cognome", "Città (Provincia)", "CAP", 
            "Data nascita", "Età", "Generazione", "Sesso", 
            "Mezzi posseduti", "Materie preferite"
        ];

        colonne.forEach(function(testo) {
            let th = document.createElement("th");
            th.textContent = testo;
            intestazione.appendChild(th);
        });

        tabella.appendChild(intestazione);

        for (let i = 0; i < dati.length; i++) {
            let persona = dati[i];

            let riga = document.createElement("tr");

            let cellaNum = document.createElement("td");
            cellaNum.textContent = (i + 1);
            riga.appendChild(cellaNum);

            let cellaNome = document.createElement("td");
            cellaNome.textContent = (persona.nome || "") + " " + (persona.cognome || "");
            riga.appendChild(cellaNome);

            let cellaCitta = document.createElement("td");
            cellaCitta.textContent = (persona.citta || "") + " (" + (persona.provincia || "") + ")";
            riga.appendChild(cellaCitta);

            let cellaCap = document.createElement("td");
            cellaCap.textContent = persona.cap || "";
            riga.appendChild(cellaCap);

            let cellaData = document.createElement("td");
            cellaData.textContent = persona.dataNascita || "–";
            riga.appendChild(cellaData);

            let cellaEta = document.createElement("td");
            cellaEta.textContent = persona.eta || "–";
            riga.appendChild(cellaEta);

            let cellaGen = document.createElement("td");
            cellaGen.textContent = persona.generazione || "–";
            riga.appendChild(cellaGen);
            
            let cellaSesso = document.createElement("td");
            cellaSesso.textContent = persona.sesso || "N/D";
            riga.appendChild(cellaSesso);

            let cellaMezzi = document.createElement("td");
            cellaMezzi.textContent = persona.mezzi && persona.mezzi.length > 0 
                ? persona.mezzi.join(", ") 
                : "Nessuno";
            riga.appendChild(cellaMezzi);

            let cellaMaterie = document.createElement("td");
            cellaMaterie.textContent = persona.materie && persona.materie.length > 0 
                ? persona.materie.join(", ") 
                : "Nessuna";
            riga.appendChild(cellaMaterie);

            tabella.appendChild(riga);
        }

        contenitore.appendChild(tabella);
    }
</script>

<br>

<a href="anagrafica5.0.html">Torna all'inserimento</a>

<br><br>

<button onclick="localStorage.clear(); location.reload();">Svuota tutto l'elenco</button>

</body>
</html>
