<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Carrello - Negozio Moderno</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* ... (Navbar e Body uguali agli altri) ... */
    :root { --primary: #6366f1; }
    body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; }
    nav { background: #0f172a; padding: 15px 30px; display: flex; align-items: center; gap: 15px; color: white; }
    .logo { flex-grow: 1; font-weight: bold; }
    nav button { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 8px; cursor: pointer; }

    .main { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    .item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; align-items: center; }
    .btn-del { background: #fee2e2; color: #ef4444; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
    .btn-del:hover { background: #ef4444; color: white; }
    .totale { font-size: 1.8rem; font-weight: bold; margin-top: 25px; text-align: right; }
    .btn-pdf { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">🛒 NegozioCSV</div>
    <button onclick="location.href='login.html'">Login</button>
    <button onclick="location.href='registrazione.html'">Registrazione</button>
    <button onclick="location.href='vetrina.html'">Vetrina</button>
    <button onclick="location.href='carrello.html'">Carrello</button>
  </nav>

  <div class="main">
    <h1>Il tuo ordine</h1>
    <div id="lista-carrello"></div>
    <div class="totale" id="totale">Totale: € 0.00</div>
    <button class="btn-pdf" onclick="generaPDF()">Scarica Scontrino PDF</button>
  </div>

  <script>
    function carica() {
      const carrello = JSON.parse(localStorage.getItem('carrello')) || [];
      const container = document.getElementById('lista-carrello');
      let t = 0;
      container.innerHTML = '';
      carrello.forEach((art, i) => {
        t += art.prezzo;
        container.innerHTML += `
          <div class="item">
            <span>${art.nome}</span>
            <span>€ ${art.prezzo.toFixed(2)}</span>
            <button class="btn-del" onclick="rimuovi(${i})">Rimuovi</button>
          </div>
        `;
      });
      document.getElementById('totale').textContent = `Totale: € ${t.toFixed(2)}`;
    }

    function rimuovi(i) {
      let carrello = JSON.parse(localStorage.getItem('carrello')) || [];
      carrello.splice(i, 1);
      localStorage.setItem('carrello', JSON.stringify(carrello));
      carica();
    }

    function generaPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.text("SCONTRINO NEGOZIO CSV", 10, 10);
      const carrello = JSON.parse(localStorage.getItem('carrello')) || [];
      let y = 20;
      carrello.forEach(art => {
        doc.text(`${art.nome} - € ${art.prezzo.toFixed(2)}`, 10, y);
        y += 10;
      });
      doc.save("scontrino.pdf");
    }

    carica();
  </script>
</body>
</html>
