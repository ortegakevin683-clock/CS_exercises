<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riepilogo - NewCave Portal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* STILI IDENTICI AI PRECEDENTI PER SIDEBAR E FOOTER */
    :root { --sidebar-bg: #0f172a; --accent: #3b82f6; --bg-main: #f8fafc; --footer-bg: #020617; --sidebar-width: 260px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-main); display: flex; min-height: 100vh; }
    nav { width: var(--sidebar-width); background: var(--sidebar-bg); color: white; position: fixed; height: 100vh; padding: 30px 0; }
    .logo-area { padding: 0 25px 40px; font-size: 1.4rem; font-weight: 800; color: white; letter-spacing: -1px; }
    .logo-area span { color: var(--accent); }
    nav button { background: transparent; color: #94a3b8; border: none; padding: 15px 25px; text-align: left; width: 100%; cursor: pointer; }
    
    .right-side-container { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .main-content { flex: 1; padding: 60px; max-width: 900px; }
    
    h2 { font-size: 2rem; color: var(--sidebar-bg); margin-bottom: 30px; font-weight: 700; }
    .cart-table { background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; margin-bottom: 30px; }
    .item { display: flex; justify-content: space-between; padding: 20px 30px; border-bottom: 1px solid #f1f5f9; align-items: center; }
    .item:last-child { border-bottom: none; }
    .item-nome { font-weight: 600; color: var(--sidebar-bg); }
    .item-prezzo { font-family: monospace; font-size: 1.1rem; color: var(--accent); }

    .summary-box { background: #1e293b; color: white; padding: 30px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
    .totale-label { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; }
    .totale-valore { font-size: 2rem; font-weight: 800; }
    
    .btn-pdf { background: var(--accent); color: white; border: none; padding: 18px 40px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 20px; float: right; }
    .btn-pdf:hover { background: #2563eb; transform: scale(1.02); }

    footer { background: var(--footer-bg); color: #64748b; padding: 50px 60px; display: flex; justify-content: space-between; margin-top: auto; }
    .footer-col h4 { color: white; margin-bottom: 18px; font-size: 0.8rem; text-transform: uppercase; }
    .footer-col p { font-size: 0.85rem; line-height: 1.8; }
  </style>
</head>
<body>
  <nav>
    <div class="logo-area">New<span>Cave</span></div>
    <button onclick="location.href='loginEcommerce.html'">Terminale Accesso</button>
    <button onclick="location.href='registrazioneEcommerce.html'">Registrazione Nodo</button>
    <button onclick="location.href='vetrinaEcommerce.html'">Sfoglia Catalogo</button>
    <button onclick="location.href='carrelloEcommerce.html'">Analisi Ordine</button>
  </nav>

  <div class="right-side-container">
    <div class="main-content">
      <h2>Riepilogo Analitico Ordine</h2>
      <div id="lista-carrello" class="cart-table">
        <!-- Generato via JS -->
      </div>
      <div class="summary-box">
        <div>
          <p class="totale-label">Valore Totale Asset</p>
          <p class="totale-valore" id="totale">€ 0.00</p>
        </div>
        <button class="btn-pdf" onclick="generaPDF()">Esporta Report PDF</button>
      </div>
    </div>

    <footer>
      <div class="footer-col"><h4>NewCave Headquarters</h4><p>Digital District, Area Rho<br>20017 Milano, IT</p></div>
      <div class="footer-col"><h4>Contatti Sistemi</h4><p>tech-support@newcave.com<br>Protocollo: +39 02 998877</p></div>
      <div class="footer-col" style="text-align: right;"><h4>Legal</h4><p>© 2026 NewCave Technologies S.p.A.<br>Sistemi di gestione asset certificati.</p></div>
    </footer>
  </div>

  <script>
    function caricaCarrello() {
      const carrello = JSON.parse(localStorage.getItem('carrello')) || [];
      const container = document.getElementById('lista-carrello');
      let totale = 0;
      container.innerHTML = '';

      if(carrello.length === 0) {
        container.innerHTML = '<div class="item">Nessun asset in coda di elaborazione.</div>';
        return;
      }

      carrello.forEach(art => {
        totale += art.prezzo;
        container.innerHTML += `
          <div class="item">
            <span class="item-nome">${art.nome}</span>
            <span class="item-prezzo">€ ${art.prezzo.toFixed(2)}</span>
          </div>`;
      });
      document.getElementById('totale').textContent = `€ ${totale.toFixed(2)}`;
    }

    function generaPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFont("helvetica", "bold");
      doc.text("NEWCAVE TECHNOLOGIES - REPORT ORDINE", 20, 20);
      doc.setFont("helvetica", "normal");
      doc.text("Documento generato automaticamente dai sistemi NewCave.", 20, 30);
      doc.text("Sede: Rho (MI) - Distretto Digitale", 20, 40);
      doc.save("Report_Ordine_NewCave.pdf");
    }

    caricaCarrello();
  </script>
</body>
</html>
