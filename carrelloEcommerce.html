    /* STILI IDENTICI AI PRECEDENTI PER SIDEBAR E FOOTER */

    nav { width: var(--sideba<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>NewCave - Lo Scrigno</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --magma: #ff4d00; --gold: #ffcc00; --dark: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: #fff; display: flex; }
        nav { width: 260px; background: #000; border-right: 2px solid var(--magma); position: fixed; height: 100vh; display: flex; flex-direction: column; padding: 40px 0; }
        .logo { font-size: 2.2rem; font-weight: 900; text-align: center; color: var(--magma); margin-bottom: 50px; }
        
        .container { margin-left: 260px; flex: 1; padding: 60px; max-width: 1000px; }
        .list-box { background: #111; border: 1px solid #222; border-radius: 12px; padding: 40px; margin-bottom: 40px; }
        .riga { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid #222; font-size: 1.3rem; }
        
        .total-panel { background: #000; border: 2px solid var(--magma); padding: 40px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .total-amount { font-size: 3rem; font-weight: 900; color: var(--gold); }
        .btn-pdf { background: #fff; color: #000; border: none; padding: 20px 40px; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 8px; }
        .btn-pdf:hover { background: var(--gold); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">NEWCAVE</div>
        <button style="color:#fff; background:none; border:none; padding:20px; cursor:pointer;" onclick="location.href='vetrinaEcommerce.html'"><- Torna alla Vetrina</button>
    </nav>
    <div class="container">
        <h1 style="color: var(--magma); margin-bottom: 40px; font-size: 2.5rem;">IL TUO SCRIGNO</h1>
        <div id="lista-minerali" class="list-box"></div>
        
        <div class="total-panel">
            <div>
                <p style="color: #666; text-transform: uppercase;">Investimento Totale</p>
                <div id="totale-display" class="total-amount">€ 0.00</div>
            </div>
            <button class="btn-pdf" onclick="scaricaPDF()">Certificato d'Autenticità</button>
        </div>
    </div>

    <script>
        function renderizza() {
            const s = JSON.parse(localStorage.getItem('scrigno')) || [];
            const div = document.getElementById('lista-minerali');
            let tot = 0;
            div.innerHTML = s.length ? '' : '<p style="color:#666">Lo scrigno è vuoto.</p>';
            
            s.forEach(m => {
                tot += parseFloat(m.prezzo);
                div.innerHTML += `<div class="riga"><span>${m.nome}</span><span style="color:var(--magma)">€ ${parseFloat(m.prezzo).toFixed(2)}</span></div>`;
            });
            document.getElementById('totale-display').textContent = `€ ${tot.toFixed(2)}`;
        }

        function scaricaPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(10, 10, 10);
            doc.rect(0, 0, 210, 297, 'F');
            doc.setTextColor(255, 77, 0);
            doc.setFontSize(32);
            doc.text("NEWCAVE - CERTIFICATO", 20, 40);
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(14);
            doc.text("Certificazione di possesso legale campioni mineralogici.", 20, 60);
            doc.save("Certificato_NewCave.pdf");
        }
        renderizza();
    </script>
</body>
</html>
