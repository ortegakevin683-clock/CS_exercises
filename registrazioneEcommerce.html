<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrazione — NegozioCSV</title>
  <!-- Collegamento al foglio di stile condiviso -->
  <link rel="stylesheet" href="stile.css" />
</head>
<body>
 
  <!-- Segnaposto della navbar: navbar.js la riempirà automaticamente -->
  <div id="navbar"></div>
 
  <!-- Contenuto della pagina -->
  <div class="contenuto">
    <h2>Crea un account</h2>
 
    <div class="form-gruppo">
      <label>Nome</label>
      <input type="text" id="reg-nome" placeholder="Il tuo nome" />
    </div>
 
    <div class="form-gruppo">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="tuaemail@esempio.com" />
    </div>
 
    <div class="form-gruppo">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Scegli una password (min. 4 caratteri)" />
    </div>
 
    <button class="btn-primario" onclick="faiRegistrazione()">Registrati</button>
 
    <p class="messaggio" id="msg-reg"></p>
 
    <p style="margin-top: 16px; font-size: 14px; color: #555;">
      Hai già un account?
      <a href="loginEcommerce.html" style="color: #ff7f50;">Accedi qui</a>
    </p>
  </div>
 
  <!-- Script condivisi -->
  <script src="navbar.js"></script>
 
  <script>
    // ============================================================
    // Logica della Registrazione
    // ============================================================
 
    function faiRegistrazione() {
      var nome     = document.getElementById('reg-nome').value;
      var email    = document.getElementById('reg-email').value;
      var password = document.getElementById('reg-password').value;
      var msg      = document.getElementById('msg-reg');
 
      // Controlliamo che tutti i campi siano compilati
      if (nome === '' || email === '' || password === '') {
        msg.style.color = 'red';
        msg.textContent = 'Compila tutti i campi!';
        return;
      }
 
      // La password deve avere almeno 4 caratteri
      if (password.length < 4) {
        msg.style.color = 'red';
        msg.textContent = 'La password deve essere di almeno 4 caratteri.';
        return;
      }
 
      // Tutto ok: mostriamo il messaggio di successo
      msg.style.color = 'green';
      msg.textContent = 'Registrazione completata! Ora puoi fare il login.';
 
      // Dopo 2 secondi portiamo l'utente alla pagina di login
      setTimeout(function() {
        window.location.href = 'loginEcommerce.html';
      }, 2000);
    }
  </script>
 
</body>
</html>
