<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>NewCave - Registrazione Nuovo Membro</title>
    <style>
        :root { --magma: #ff4d00; --gold: #ffcc00; --dark: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: #fff; display: flex; min-height: 100vh; }

        /* Sidebar Nav - Identica alle altre per continuità */
        nav { width: 260px; background: #000; border-right: 2px solid var(--magma); display: flex; flex-direction: column; padding: 40px 0; position: fixed; height: 100vh; box-shadow: 10px 0 30px rgba(255, 77, 0, 0.1); }
        .logo { font-size: 2.2rem; font-weight: 900; text-align: center; color: var(--magma); text-shadow: 0 0 15px var(--magma); margin-bottom: 50px; }
        nav button { background: transparent; color: #fff; border: none; padding: 20px; text-align: left; cursor: pointer; text-transform: uppercase; font-weight: bold; border-left: 4px solid transparent; transition: 0.3s; }
        nav button:hover { background: rgba(255, 77, 0, 0.1); border-left-color: var(--magma); color: var(--gold); }

        /* Area Centrale */
        .content { margin-left: 260px; flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #220a00 0%, #050505 100%); }
        .auth-card { background: #111; padding: 50px; border-radius: 15px; border: 1px solid #333; width: 100%; max-width: 500px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        h1 { color: var(--magma); font-size: 2.5rem; margin-bottom: 30px; text-align: center; text-transform: uppercase; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; color: var(--gold); text-transform: uppercase; font-size: 0.75rem; margin-bottom: 8px; letter-spacing: 1px; }
        input { width: 100%; padding: 15px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--magma); box-shadow: 0 0 10px rgba(255, 77, 0, 0.4); }
        
        .btn-fire { width: 100%; background: linear-gradient(45deg, var(--magma), #ff9100); color: #000; border: none; padding: 20px; font-weight: 900; cursor: pointer; border-radius: 8px; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-fire:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 77, 0, 0.4); }
        
        .link-swap { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #666; }
        .link-swap a { color: var(--magma); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">NEWCAVE</div>
        <button onclick="location.href='loginEcommerce.html'">Login</button>
        <button onclick="location.href='registrazioneEcommerce.html'">Registrazione</button>
        <button onclick="location.href='vetrinaEcommerce.html'">Collezione</button>
        <button onclick="location.href='carrelloEcommerce.html'">Scrigno</button>
    </nav>

    <div class="content">
        <div class="auth-card">
            <h1>ISCRIVITI</h1>
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="reg-nome" placeholder="Mario Rossi">
            </div>
            <div class="form-group">
                <label>Email Collezionista</label>
                <input type="email" id="reg-email" placeholder="esempio@mail.it">
            </div>
            <div class="form-group">
                <label>Crea Chiave d'Accesso</label>
                <input type="password" id="reg-pass" placeholder="Minimo 8 caratteri">
            </div>
            <button class="btn-fire" onclick="validaERegistra()">Crea Profilo Magmatico</button>
            
            <div class="link-swap">
                Hai già un account? <a href="loginEcommerce.html">Accedi qui</a>
            </div>
        </div>
    </div>

    <script>
        function validaERegistra() {
            const nome = document.getElementById('reg-nome').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            if(nome === "" || email === "" || pass === "") {
                alert("Non lasciare campi vuoti, i minerali richiedono precisione!");
                return;
            }

            if(pass.length < 5) {
                alert("Password troppo debole per proteggere un caveau!");
                return;
            }

            // Simulazione salvataggio (puoi implementare un vero database in futuro)
            localStorage.setItem('userRegistered', email);
            alert("Registrazione completata con successo, " + nome + "! Ora puoi accedere.");
            location.href = 'loginEcommerce.html';
        }
    </script>
</body>
</html>
