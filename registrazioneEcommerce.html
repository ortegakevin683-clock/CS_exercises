    <div id="registrazione">
      <h1>Non sei nostro cliente?<br>REGISTRATI SUBITO</h1>
  <h2>Crea un account</h2>
  <div class="form-gruppo">
    <label>Nome</label>
    <input type="text" id="reg-nome" placeholder="Il tuo nome" />
  </div>
  <div class="form-gruppo">
    <label>Cognome</label>
    <input type="text" id="reg-cog" placeholder="il tuo cognome"/>
  </div>
   <div class="form-gruppo">
    <label>CAP</label>
    <input type="text" id="reg-CAP" placeholder="Il tuo CAP" />
  </div>
  <div class="form-gruppo">
    <label>Indirizzo</label>
    <input type="text" id="reg-ind" placeholder="Il tuo indirizzo" />
  </div>
  <div class="form-gruppo">
    <label>Email</label>
    <input type="email" id="reg-email" placeholder="tuaemail@esempio.com" />
  </div>
  <div class="form-gruppo">
    <label>Password</label>
    <input type="password" id="reg-password" placeholder="Scegli una password" />
  </div>
  <button class="btn-primario" onclick="faiRegistrazione()">Registrati</button>
  <p class="messaggio" id="msg-reg"></p>
</div>
    <script> 
       let nome = document.getElementById("reg-nome").value;
      
    let cognome = document.getElementById("reg-cog").value;

    let cap = document.getElementById("reg-CAP").value;
    
    let email = document.getElementById("reg-email").value;
    
    function faiRegistrazione() {
    var nome = document.getElementById('reg-nome').value;
    if (!/^[a-zA-Z ]+$/.test(nome)) {
        alert("Errore: Nome solo lettere e spazi!");
        return;
    }
    var cognome = document.getElementById('reg-cog').value;
    if (!/^[a-zA-Z ]+$/.test(cognome)) {
        alert("Errore: Cognome solo lettere e spazi!");
        return;
    }
    var CAP = document.getElementById('reg-CAP').value;
    if (cap.length != 5 || isNaN(cap)) {
        alert("Errore: CAP deve essere 5 numeri!");
        return;
    }
    var indirizzo = document.getElementById('reg-ind').value;
    var email = document.getElementById('reg-email').value;
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        alert("Errore: Email non valida!");
        return;
    }
    var password = document.getElementById('reg-password').value;
    if(!/^[a-z0-9_-]{6,18}$/.test(password)){
      alert("Errore : password non valida";
      return;
    }
    if (nome != '' || cognome != '' || CAP != '' || indirizzo != '' || email != '' || password != '') {
      
      return alert("Registrazione eseguita, Benvenuto");
    }  

  </script>
