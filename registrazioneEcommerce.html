<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrazione - Negozio Moderno</title>
  <style>
    :root {
      --primary: #6366f1;
      --secondary: #a855f7;
      --bg: #f1f5f9;
      --text: #1e293b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
    }

    /* NAVBAR */
    nav {
      background: #0f172a;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .logo { 
      color: white; 
      font-weight: bold; 
      margin-right: auto; 
      font-size: 1.2rem; 
      letter-spacing: -0.5px;
    }
    nav button {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    nav button:hover { 
      background: var(--primary); 
      transform: translateY(-2px); 
      border-color: var(--primary);
    }

    /* CARD REGISTRAZIONE */
    .container {
      max-width: 480px;
      margin: 60px auto;
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.06);
      animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes slideUp { 
      from { opacity: 0; transform: translateY(40px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    h2 { 
      margin-bottom: 10px; 
      text-align: center; 
      color: #0f172a; 
      font-size: 1.8rem;
    }
    p.subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }

    .form-group { margin-bottom: 20px; }
    label { 
      display: block; 
      margin-bottom: 8px; 
      font-size: 0.85rem; 
      font-weight: 600; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #475569;
    }
    input { 
      width: 100%; 
      padding: 14px; 
      border: 1.5px solid #e2e8f0; 
      border-radius: 12px; 
      outline: none; 
      transition: all 0.3s ease; 
      font-size: 1rem;
    }
    input:focus { 
      border-color: var(--primary); 
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); 
    }
    
    .btn-register {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }
    .btn-register:hover { 
      filter: brightness(1.1); 
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
    }

    #msg-reg {
      margin-top: 20px;
      text-align: center;
      font-weight: 500;
      min-height: 24px;
    }

    .footer-link {
      text-align: center;
      margin-top: 25px;
      font-size: 0.9rem;
      color: #64748b;
    }
    .footer-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">🛒 NegozioCSV</div>
    <button onclick="location.href='login.html'">Login</button>
    <button onclick="location.href='registrazione.html'">Registrazione</button>
    <button onclick="location.href='vetrina.html'">Vetrina</button>
    <button onclick="location.href='carrello.html'">Carrello</button>
  </nav>

  <div class="container">
    <h2>Crea Account</h2>
    <p class="subtitle">Unisciti alla nostra community</p>
    
    <div class="form-group">
      <label>Nome Completo</label>
      <input type="text" id="reg-nome" placeholder="Es. Mario Rossi">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="mario@esempio.it">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Almeno 4 caratteri">
    </div>

    <button class="btn-register" onclick="faiRegistrazione()">Registrati Ora</button>
    
    <p id="msg-reg"></p>

    <div class="footer-link">
      Hai già un account? <a href="login.html">Accedi qui</a>
    </div>
  </div>

  <script>
    function faiRegistrazione() {
      const nome = document.getElementById('reg-nome').value;
      const email = document.getElementById('reg-email').value;
      const pass = document.getElementById('reg-password').value;
      const msg = document.getElementById('msg-reg');

      // Validazione base
      if (nome === '' || email === '' || pass === '') {
        msg.style.color = '#ef4444'; // Rosso
        msg.textContent = '⚠️ Compila tutti i campi!';
        return;
      }

      if (pass.length < 4) {
        msg.style.color = '#ef4444';
        msg.textContent = '⚠️ Password troppo corta (min 4 car.)';
        return;
      }

      // Simulazione successo
      msg.style.color = '#10b981'; // Verde
      msg.textContent = '✅ Registrazione completata! Vai al login.';
      
      // Opzionale: pulisci i campi dopo 2 secondi
      setTimeout(() => {
        document.getElementById('reg-nome').value = '';
        document.getElementById('reg-email').value = '';
        document.getElementById('reg-password').value = '';
        // volendo puoi reindirizzare al login
        // location.href = 'login.html';
      }, 2000);
    }
  </script>

</body>
</html>
