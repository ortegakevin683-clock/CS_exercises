<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>NewCave - Login Collezionisti</title>
<style>
    :root { --dark: #121212; --gold: #c5a059; --text: #e0e0e0; --sidebar: 260px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Garamond', serif; background: #1a1a1a; color: var(--text); display: flex; min-height: 100vh; }

    nav { width: var(--sidebar); background: var(--dark); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 40px 0; position: fixed; height: 100vh; }
    .logo-area { padding: 0 25px 50px; font-size: 1.8rem; font-weight: bold; letter-spacing: 3px; color: var(--gold); text-align: center; }
    nav button { background: transparent; color: #888; border: none; padding: 18px 25px; text-align: left; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; transition: 0.3s; }
    nav button:hover { color: var(--gold); background: rgba(197, 160, 89, 0.05); }

    .right-side-container { margin-left: var(--sidebar); flex: 1; display: flex; flex-direction: column; }
    .hero-section { display: flex; padding: 100px 60px; gap: 80px; align-items: center; flex: 1; }
    
    .form-box { flex: 1; max-width: 400px; background: #222; padding: 50px; border: 1px solid #333; border-radius: 2px; }
    .info-box { flex: 1.5; }
    .info-box h1 { font-size: 3.5rem; color: var(--gold); margin-bottom: 30px; font-weight: normal; }
    .info-box p { font-size: 1.3rem; line-height: 1.8; color: #aaa; font-style: italic; }

    footer { background: #000; color: #555; padding: 50px 60px; display: flex; justify-content: space-between; border-top: 1px solid #222; }
    .footer-col h4 { color: var(--gold); margin-bottom: 15px; font-size: 0.75rem; text-transform: uppercase; }
    .footer-col p { font-size: 0.8rem; line-height: 2; }

    input { width: 100%; padding: 12px; margin: 10px 0 25px; background: #111; border: 1px solid #444; color: white; outline: none; }
    input:focus { border-color: var(--gold); }
    .btn-main { width: 100%; background: var(--gold); color: black; border: none; padding: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
  </style>
</head>
  <body>
<div class="hero-section">
  <div class="form-box">
    <h2 style="margin-bottom: 30px; font-weight: normal;">Registrazione</h2>
    <label>Nome e Cognome</label><input type="text">
    <label>Email Collezionista</label><input type="email">
    <label>Password</label><input type="password">
    <button class="btn-main">Unisciti a NewCave</button>
  </div>
  <div class="info-box">
    <h1>Diventa un Cercatore di Rarità.</h1>
    <p>Registrandoti avrai accesso prioritario alle nuove estrazioni e potrai consultare i certificati di autenticità dei tuoi campioni in tempo reale. NewCave è il ponte tra la terra e la tua bacheca.</p>
  </div>
</div>
  </body>
</html>
