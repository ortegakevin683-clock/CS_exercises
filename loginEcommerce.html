<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Negozio Moderno</title>
  <style>
    :root {
      --primary: #6366f1;
      --secondary: #a855f7;
      --bg: #f1f5f9;
      --text: #1e293b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

    /* NAVBAR */
    nav {
      background: #0f172a;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .logo { color: white; font-weight: bold; margin-right: auto; font-size: 1.2rem; }
    nav button {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    nav button:hover { background: var(--primary); transform: translateY(-2px); }

    /* CARD LOGIN */
    .container {
      max-width: 450px;
      margin: 80px auto;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      animation: slideUp 0.6s ease-out;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    h2 { margin-bottom: 25px; text-align: center; color: #0f172a; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-size: 0.9rem; font-weight: 600; }
    input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; transition: 0.3s; }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
    
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-submit:hover { filter: brightness(1.1); transform: scale(1.02); }
  </style>
</head>
<body>
  <nav>
    <div class="logo">🛒 NegozioCSV</div>
    <button onclick="location.href='loginEcommerce.html'">Login</button>
    <button onclick="location.href='registrazioneEcommerce.html'">Registrazione</button>
    <button onclick="location.href='vetrinaEcommerce.html'">Vetrina</button>
    <button onclick="location.href='carrelloEcommerce.html'">Carrello</button>
  </nav>

  <div class="container">
    <h2>Bentornato!</h2>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="utente@test.it">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="pass" placeholder="1234">
    </div>
    <button class="btn-submit" onclick="faiLogin()">Accedi</button>
    <p id="msg" style="margin-top:15px; text-align:center;"></p>
  </div>

  <script>
    function faiLogin() {
      const e = document.getElementById('email').value;
      const p = document.getElementById('pass').value;
      if(e === 'utente@test.it' && p === '1234') {
        localStorage.setItem('utenteLoggato', e);
        document.getElementById('msg').innerHTML = "✅ Login in corso...";
        setTimeout(() => location.href = 'vetrina.html', 1000);
      } else {
        document.getElementById('msg').innerHTML = "❌ Credenziali errate.";
      }
    }
  </script>
</body>
</html>
