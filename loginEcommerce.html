<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Negozio Moderno</title>
  <style>
    :root {
      --primary: #6366f1;
      --secondary: #a855f7;
      --bg: #f1f5f9;
      --text: #1e293b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      min-height: 100vh;
    }

    /* NAVBAR */
    nav {
      background: #0f172a;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .logo { 
      color: white; 
      font-weight: bold; 
      margin-right: auto; 
      font-size: 1.2rem; 
      letter-spacing: -0.5px;
    }
    nav button {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    nav button:hover { 
      background: var(--primary); 
      transform: translateY(-2px); 
      border-color: var(--primary);
    }

    /* CARD LOGIN */
    .container {
      max-width: 450px;
      margin: 80px auto;
      background: white;
      padding: 45px;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.06);
      animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes slideUp { 
      from { opacity: 0; transform: translateY(40px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    h2 { 
      margin-bottom: 8px; 
      text-align: center; 
      color: #0f172a; 
      font-size: 1.8rem;
    }
    p.subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 35px;
      font-size: 0.95rem;
    }

    .form-group { margin-bottom: 22px; }
    label { 
      display: block; 
      margin-bottom: 8px; 
      font-size: 0.85rem; 
      font-weight: 600; 
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #475569;
    }
    input { 
      width: 100%; 
      padding: 14px; 
      border: 1.5px solid #e2e8f0; 
      border-radius: 12px; 
      outline: none; 
      transition: all 0.3s ease; 
      font-size: 1rem;
    }
    input:focus { 
      border-color: var(--primary); 
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); 
    }
    
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }
    .btn-submit:hover { 
      filter: brightness(1.1); 
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
    }

    #msg {
      margin-top: 20px;
      text-align: center;
      font-weight: 500;
      min-height: 24px;
    }

    .footer-link {
      text-align: center;
      margin-top: 25px;
      font-size: 0.9rem;
      color: #64748b;
    }
    .footer-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">🛒 NegozioCSV</div>
    <button onclick="location.href='loginEcommerce.html'">Login</button>
    <button onclick="location.href='registrazioneEcommerce.html'">Registrazione</button>
    <button onclick="location.href='vetrinaEcommerce.html'">Vetrina</button>
    <button onclick="location.href='carrelloEcommerce.html'">Carrello</button>
  </nav>

  <div class="container">
    <h2>Bentornato!</h2>
    <p class="subtitle">Accedi per gestire i tuoi acquisti</p>
    
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="utente@test.it">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="pass" placeholder="1234">
    </div>
    
    <button class="btn-submit" onclick="faiLogin()">Accedi</button>
    
    <p id="msg"></p>

    <div class="footer-link">
      Non hai un account? <a href="registrazioneEcommerce.html">Registrati ora</a>
    </div>
  </div>

  <script>
    function faiLogin() {
      const e = document.getElementById('email').value;
      const p = document.getElementById('pass').value;
      const msg = document.getElementById('msg');

      // Controllo credenziali di test
      if(e === 'utente@test.it' && p === '1234') {
        localStorage.setItem('utenteLoggato', e);
        msg.style.color = '#10b981'; // Verde
        msg.innerHTML = "✅ Login in corso... attendi.";
        
        // Simula caricamento e cambia pagina
        setTimeout(() => {
          location.href = 'vetrinaEcommerce.html';
        }, 1200);
      } else {
        msg.style.color = '#ef4444'; // Rosso
        msg.innerHTML = "❌ Email o password errati.";
      }
    }

    // Se l'utente è già loggato, possiamo mostrare il suo nome nella console o gestire reindirizzamenti
    window.onload = function() {
      const utente = localStorage.getItem('utenteLoggato');
      if(utente) {
        console.log("Sessione attiva per: " + utente);
      }
    }
  </script>
</body>
</html>
